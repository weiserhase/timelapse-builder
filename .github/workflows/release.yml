name: release

# Build self-contained bundles (binary + ffmpeg) for every OS and attach them
# to the GitHub Release when a v* tag is pushed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  NAME: timelapse-builder
  BIN: timelapse
  GUI_BIN: timelapse-gui

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            ext: ".exe"
          # - os: macos-13
          #   target: x86_64-apple-darwin
          #   platform: macos
          #   ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux GUI deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build (CLI + GUI)
        run: cargo build --release --target ${{ matrix.target }} --features gui --bins

      - name: Stage bundle (binaries + ffmpeg)
        shell: bash
        run: |
          set -euo pipefail
          STAGE="${NAME}-${{ matrix.platform }}-x86_64"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.target }}/release/${BIN}${{ matrix.ext }}" "dist/${STAGE}/"
          cp "target/${{ matrix.target }}/release/${GUI_BIN}${{ matrix.ext }}" "dist/${STAGE}/"
          FF="$(bash scripts/fetch-ffmpeg.sh ${{ matrix.platform }} dist/.ff)"
          cp "$FF" "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/" 2>/dev/null || true
          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"

      - name: Archive (tar.gz)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "dist/${STAGE}.tar.gz" -C dist "${STAGE}"
          echo "ASSET=dist/${STAGE}.tar.gz" >> "$GITHUB_ENV"

      - name: Archive (zip)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/$env:STAGE" -DestinationPath "dist/$env:STAGE.zip" -Force
          "ASSET=dist/$env:STAGE.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}-${{ matrix.platform }}-x86_64
          path: ${{ env.ASSET }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
